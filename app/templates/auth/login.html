<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — SOC Deletec</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { bg: '#0A0A0A', surface: '#141414', border: '#262626', accent: '#E8FF47', muted: '#6B6B6B' },
          fontFamily: { title: ['Syne', 'sans-serif'], body: ['DM Sans', 'sans-serif'] },
          borderRadius: { DEFAULT: '2px', sm: '2px', md: '2px', lg: '2px' },
        }
      }
    }
  </script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-bg text-[#F5F5F5] font-body min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-sm">

  <!-- Header -->
  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-12 h-12 border border-accent mb-4">
      <i class="bi bi-shield-shaded text-accent text-xl"></i>
    </div>
    <h1 class="font-title text-2xl leading-tight">
      <span class="text-accent">SOC</span> Deletec
    </h1>
    <p class="text-xs text-muted mt-1 uppercase tracking-widest">Accès sécurisé</p>
  </div>

  <!-- Flash messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="mb-4 space-y-2">
      {% for category, message in messages %}
      <div class="px-4 py-3 border text-sm
        {% if category == 'danger' %}border-red-700 bg-red-950/50 text-red-300
        {% elif category == 'warning' %}border-yellow-700 bg-yellow-950/50 text-yellow-300
        {% else %}border-border bg-surface text-[#F5F5F5]{% endif %}">
        {{ message }}
      </div>
      {% endfor %}
    </div>
    {% endif %}
  {% endwith %}

  <!-- Card -->
  <div class="bg-surface border border-border p-8">
    <form method="POST" action="{{ url_for('auth.login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-5">
        <label for="username" class="block text-[10px] text-muted uppercase tracking-widest mb-2">Identifiant</label>
        <input type="text" id="username" name="username" required autocomplete="username" autofocus
               class="w-full bg-bg border border-border text-[#F5F5F5] px-3 py-2.5 text-sm outline-none transition-colors duration-200 focus:border-accent placeholder:text-muted">
      </div>

      <div class="mb-6">
        <label for="password" class="block text-[10px] text-muted uppercase tracking-widest mb-2">Mot de passe</label>
        <input type="password" id="password" name="password" required autocomplete="current-password"
               class="w-full bg-bg border border-border text-[#F5F5F5] px-3 py-2.5 text-sm outline-none transition-colors duration-200 focus:border-accent placeholder:text-muted">
      </div>

      <button type="submit"
              class="w-full bg-accent text-bg font-title text-xs py-3 font-bold uppercase tracking-widest transition-colors duration-200 hover:bg-[#d4eb3d]">
        Se connecter
      </button>
    </form>
  </div>

  <p class="text-center text-[10px] text-muted mt-6 uppercase tracking-widest">
    PRTG · Wazuh · SOAR — Deletec
  </p>
</div>

</body>
</html>
