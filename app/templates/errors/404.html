{% extends "base.html" %}
{% block title %}Page introuvable{% endblock %}
{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh] text-center">
  <p class="font-title text-8xl text-border mb-6">404</p>
  <h1 class="font-title text-2xl text-[#F5F5F5] mb-2">Page introuvable</h1>
  <p class="text-muted text-sm mb-8">La ressource demandée n'existe pas ou a été déplacée.</p>
  <a href="{{ url_for('dashboard.dashboard') }}"
     class="border border-border text-[#F5F5F5] text-xs px-6 py-3 uppercase tracking-widest hover:border-accent hover:text-accent transition-colors duration-200">
    Retour au dashboard
  </a>
</div>
{% endblock %}
